name: Alpha Daily Dispatch

# ─────────────────────────────────────────────
#  TIMING SETTINGS
# ─────────────────────────────────────────────
on:
  schedule:
    # Ye roz subah Indian Time (IST) 9:00 AM par chalega
    # (3:30 AM UTC = 9:00 AM IST)
    - cron: '30 3 * * *'
  
  # Isse tu GitHub par "Run Workflow" button daba kar manually bhi check kar sakta hai
  workflow_dispatch:

# ─────────────────────────────────────────────
#  THE EXECUTION STEPS
# ─────────────────────────────────────────────
jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v3

      - name: 🐍 Setup Python Environment
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: 📦 Install Necessary Libraries
        run: |
          pip install requests groq

      - name: 🐺 Execute Alpha Worker
        # Yahan hum GitHub ke "Tijori" (Secrets) se keys utha rahe hain
        env:
          NEWS_API_KEY: ${{ secrets.NEWS_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          EMAIL_USER: ${{ secrets.EMAIL_USER }}
          EMAIL_PASS: ${{ secrets.EMAIL_PASS }}
        run: python worker.py
